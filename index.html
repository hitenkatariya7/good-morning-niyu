<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Good Morning, Niyu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Caveat:wght@500;600;700&family=Work+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#3B2A35;
    --ink-soft:#6E5A66;
    --gold:#D9A441;
    --blush:#F0C9C0;
    --mauve:#B98CA5;
    --paper:#FBF5F1;

    --sky-top:#FCEEDD;
    --sky-bottom:#F6C9B8;
    --sun-color:#E3A64B;
    --text-on-sky:#3B2A35;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html{scroll-behavior:smooth;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Work Sans', sans-serif;
    color:var(--ink);
    background:var(--paper);
    overflow-x:hidden;
  }

  #gate{
    position:fixed; inset:0; z-index:50;
    background:var(--paper);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:22px; padding:24px; text-align:center;
    transition: opacity 0.6s ease;
  }
  #gate.hidden{ opacity:0; pointer-events:none; }
  .gate-label{ font-family:'Caveat', cursive; font-size:1.6rem; color:var(--mauve); }
  #pwd{
    font-family:'Work Sans', sans-serif; font-size:1.1rem;
    padding:14px 18px; border-radius:14px; border:1.5px solid var(--blush);
    background:#fff; color:var(--ink); width:220px; text-align:center;
    outline:none; letter-spacing:2px;
  }
  #pwd:focus{ border-color:var(--gold); }
  #unlockBtn{
    font-family:'Work Sans', sans-serif; font-size:0.95rem; letter-spacing:0.5px;
    padding:12px 28px; border-radius:999px; border:none;
    background:var(--ink); color:var(--paper); cursor:pointer;
    transition: transform 0.2s ease;
  }
  #unlockBtn:active{ transform:scale(0.97); }
  #gateError{ font-size:0.85rem; color:#b5546b; height:16px; opacity:0; transition: opacity 0.2s ease; }
  #gateError.show{ opacity:1; }

  #app{ opacity:0; transition: opacity 0.9s ease; }
  #app.visible{ opacity:1; }

  .hero{
    position:relative;
    min-height:100svh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background: linear-gradient(to bottom, var(--sky-top), var(--sky-bottom));
    color: var(--text-on-sky);
    overflow:hidden;
    transition: background 1.8s ease, color 1.8s ease;
    padding: 40px 24px 80px;
    text-align:center;
  }

  .stars{ position:absolute; inset:0; opacity:0; transition:opacity 1.5s ease; pointer-events:none; }
  .star{
    position:absolute; width:2px; height:2px; background:#fff; border-radius:50%;
    animation: twinkle 3s ease-in-out infinite;
  }
  @keyframes twinkle{ 0%,100%{opacity:0.2;} 50%{opacity:1;} }

  .cloud{
    position:absolute; background: rgba(255,255,255,0.6);
    border-radius:50%; filter: blur(9px); animation: drift linear infinite;
    transition: opacity 1s ease;
  }
  @keyframes drift{ from{ transform: translateX(-15vw); } to{ transform: translateX(115vw); } }

  .rain{ position:absolute; inset:0; opacity:0; transition:opacity 1s ease; pointer-events:none; }
  .drop{
    position:absolute; width:2px; height:16px; top:-20px;
    background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0.55));
    animation: fall linear infinite;
  }
  @keyframes fall{ to{ transform: translateY(120vh); } }

  .sun{
    position:absolute; width:120px; height:120px; border-radius:50%;
    background: var(--sun-color);
    box-shadow: 0 0 60px 10px color-mix(in srgb, var(--sun-color) 55%, transparent);
    transition: background 1.8s ease, opacity 1.5s ease, transform 2s ease;
    z-index:0;
  }

  .hero-content{ position:relative; z-index:2; }
  .eyebrow{ font-size:0.7rem; letter-spacing:3px; text-transform:uppercase; opacity:0.75; margin-bottom:14px; }
  h1{
    font-family:'Fraunces', serif; font-weight:500; font-optical-sizing:auto;
    font-size:2.7rem; line-height:1.12; margin:0 0 8px;
  }
  h1 .script{
    font-family:'Caveat', cursive; font-weight:700; color:var(--gold);
    font-size:1.2em; margin-left:8px; display:inline-block;
  }
  .date{ font-size:0.9rem; opacity:0.85; margin-bottom:18px; }
  .chips{ display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin-bottom:6px; }
  .chip{
    display:inline-flex; align-items:center; gap:8px;
    background: rgba(255,255,255,0.35); backdrop-filter: blur(6px);
    border:1px solid rgba(255,255,255,0.5); padding:8px 16px; border-radius:999px;
    font-size:0.78rem; letter-spacing:0.3px;
  }
  .scroll-cue{
    position:absolute; bottom:28px; left:50%; transform:translateX(-50%);
    z-index:2; font-size:0.7rem; letter-spacing:2px; text-transform:uppercase;
    opacity:0.7; display:flex; flex-direction:column; align-items:center; gap:6px;
  }
  .scroll-cue span{ width:1px; height:26px; background: currentColor; animation: pulse-down 1.8s ease-in-out infinite; }
  @keyframes pulse-down{ 0%,100%{ opacity:0.2; } 50%{ opacity:0.9; } }

  .letter-section{
    position:relative;
    min-height:100vh;
    background:
      radial-gradient(ellipse 70% 40% at 50% 0%, rgba(240,201,192,0.35), transparent 65%),
      var(--paper);
    display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
    padding: 20vh 24px 90px; text-align:center;
  }
  .flourish{
    display:flex; align-items:center; gap:12px; margin-bottom:34px; color:var(--mauve); opacity:0.8;
  }
  .flourish::before, .flourish::after{
    content:''; width:38px; height:1px; background: var(--blush);
  }
  .flourish svg{ width:16px; height:16px; }

  .letter-hint{ font-family:'Caveat', cursive; font-size:1.3rem; color:var(--mauve); margin-bottom:26px; }

  .floating-hearts{ position:absolute; inset:0; overflow:hidden; pointer-events:none; z-index:0; }
  .fheart{
    position:absolute; bottom:-40px; opacity:0; color: var(--mauve);
    animation: floatUp linear infinite;
  }
  @keyframes floatUp{
    0%{ transform: translateY(0) translateX(0) rotate(0deg); opacity:0; }
    10%{ opacity:0.35; }
    90%{ opacity:0.25; }
    100%{ transform: translateY(-70vh) translateX(var(--drift,20px)) rotate(20deg); opacity:0; }
  }

  #envelope{ width:180px; height:130px; cursor:pointer; position:relative; margin-bottom:10px; transition: transform 0.4s ease; }
  #envelope:active{ transform: scale(0.97); }
  #envelope.open{ transform: scale(0.92) translateY(-6px); }
  .env-body{
    position:absolute; inset:0;
    background: linear-gradient(135deg, #fff 0%, var(--blush) 140%);
    border-radius:8px; box-shadow: 0 16px 34px rgba(59,42,53,0.18);
  }
  .env-flap{
    position:absolute; top:0; left:0; right:0; height:70px;
    background: linear-gradient(135deg, var(--blush), var(--mauve));
    clip-path: polygon(0 0, 100% 0, 50% 68%);
    border-radius:8px 8px 0 0; transform-origin: top;
    transition: transform 0.6s cubic-bezier(.4,0,.2,1); z-index:2;
  }
  .env-seal{
    position:absolute; top:34px; left:50%; transform:translate(-50%,0);
    width:36px; height:36px;
    z-index:3; transition: opacity 0.3s ease;
    animation: sealPulse 2.4s ease-in-out infinite;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.18));
  }
  .env-seal svg{ width:100%; height:100%; }
  @keyframes sealPulse{ 0%,100%{ transform:translate(-50%,0) scale(1); } 50%{ transform:translate(-50%,0) scale(1.08); } }
  #envelope.open .env-flap{ transform: rotateX(180deg); }
  #envelope.open .env-seal{ opacity:0; }
  #envelope.open{ pointer-events:none; }
  .tap-label{
    font-size:0.78rem; letter-spacing:1.5px; text-transform:uppercase; color: var(--ink-soft);
    margin-top:14px; transition: opacity 0.3s ease;
  }

  .letter-paper{
    max-width:460px; width:100%; background:#fff;
    border-radius:14px; box-shadow: 0 20px 50px rgba(59,42,53,0.14);
    padding: 0 30px; text-align:center;
    max-height:0; opacity:0; overflow:hidden;
    transform: translateY(-30px) scale(0.8);
    transition:
      max-height 0.75s cubic-bezier(.16,1,.3,1),
      padding 0.75s cubic-bezier(.16,1,.3,1),
      opacity 0.5s ease 0.15s,
      transform 0.65s cubic-bezier(.34,1.56,.64,1) 0.08s,
      margin-top 0.75s cubic-bezier(.16,1,.3,1);
    margin-top:0;
  }
  .letter-paper.show{
    max-height:1400px; opacity:1; transform: translateY(0) scale(1);
    padding: 38px 30px; margin-top:30px;
  }
  .memory-title{ font-family:'Caveat', cursive; font-size:1.9rem; color:var(--mauve); margin:0 0 14px; }
  .photos{ display:flex; flex-wrap:wrap; justify-content:center; gap:14px; margin:8px 0 26px; }
  .photo-card{
    background:#fff; padding:8px 8px 18px; border-radius:6px;
    box-shadow: 0 10px 26px rgba(59,42,53,0.14);
    transform: rotate(var(--r, -2deg)); cursor:pointer; transition: transform 0.25s ease;
  }
  .photo-card:hover{ transform: rotate(0deg) scale(1.04); }
  .photo-card:nth-child(even){ --r: 2deg; }
  .photo-card:nth-child(3n){ --r: -1.2deg; }
  .photo-card img{ display:block; width:150px; height:180px; object-fit:cover; border-radius:2px; }

  .message{ font-family:'Fraunces', serif; font-weight:400; font-size:1.12rem; line-height:1.7; color:var(--ink); white-space:pre-wrap; }
  .signoff{ font-family:'Caveat', cursive; font-size:1.3rem; color:var(--ink-soft); margin-top:22px; margin-bottom: 4px;}

  #lightbox{
    position:fixed; inset:0; background:rgba(20,12,18,0.88);
    display:none; align-items:center; justify-content:center; z-index:60; padding:20px;
  }
  #lightbox.show{ display:flex; }
  #lightbox img{ max-width:100%; max-height:85vh; border-radius:6px; box-shadow:0 20px 50px rgba(0,0,0,0.5); }

  footer{
    text-align:center; padding: 30px 24px 50px;
    font-size:0.68rem; letter-spacing:1px; color:var(--ink-soft);
    opacity:0.55; text-transform:uppercase;
  }

  @media (max-width:400px){
    h1{ font-size:2.2rem; }
    .message{ font-size:1.02rem; }
  }
</style>
</head>
<body>

<div id="gate">
  <div class="gate-label">good morning belongs to Niyu only</div>
  <input id="pwd" type="password" inputmode="numeric" placeholder="• • • • • • • •" maxlength="20" autocomplete="off">
  <button id="unlockBtn">Unlock</button>
  <div id="gateError">that's not quite it, try again</div>
</div>

<div id="app">

  <section class="hero" id="hero">
    <div class="stars" id="stars"></div>
    <div class="rain" id="rain"></div>
    <div class="sun" id="sun"></div>
    <div class="floating-hearts" id="heroHearts"></div>
    <div class="hero-content">
      <div class="eyebrow">for niyu</div>
      <h1>Good morning<span class="script">Niyu</span></h1>
      <div class="date" id="dateLabel"></div>
      <div class="chips">
        <div class="chip" id="dayChip"></div>
        <div class="chip" id="weatherChip" style="display:none;"></div>
      </div>
    </div>
    <div class="scroll-cue"><span></span>scroll</div>
  </section>

  <section class="letter-section">
    <div class="floating-hearts" id="letterHearts"></div>
    <div style="position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; width:100%;">
      <div class="flourish">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M16 28C16 28 3 19.8 3 11.6C3 7.4 6.4 4 10.4 4C13 4 15 5.4 16 7.2C17 5.4 19 4 21.6 4C25.6 4 29 7.4 29 11.6C29 19.8 16 28 16 28Z" fill="currentColor"/></svg>
      </div>
      <div class="letter-hint">you've got something today</div>
      <div id="envelope" style="position:relative;">
        <div class="env-body"></div>
        <div class="env-flap"></div>
        <div class="env-seal">
          <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M16 28C16 28 3 19.8 3 11.6C3 7.4 6.4 4 10.4 4C13 4 15 5.4 16 7.2C17 5.4 19 4 21.6 4C25.6 4 29 7.4 29 11.6C29 19.8 16 28 16 28Z" fill="var(--gold)"/>
            <text x="16" y="15" font-family="Caveat, cursive" font-weight="700" font-size="11" fill="#fff" text-anchor="middle">N</text>
          </svg>
        </div>
      </div>
      <div class="tap-label" id="tapLabel">tap to open</div>

      <div class="letter-paper" id="letterPaper">
        <div id="memoryBlock" style="display:none;">
          <div class="memory-title" id="memoryTitle"></div>
          <div class="photos" id="photos"></div>
        </div>
        <div class="message" id="messageText">loading...</div>
        <div class="signoff" id="signoff"></div>
      </div>
    </div>
  </section>

  <footer>made every morning, for you</footer>
</div>

<div id="lightbox"><img id="lightboxImg" src="" alt=""></div>

<script>
(async function(){
  const CORRECT_HASH = "f6a6ede1db281475a3d12161f3630e225fb251ae0a21453a24520c3f00cb2d85";
  async function sha256(text){
    const enc = new TextEncoder().encode(text);
    const buf = await crypto.subtle.digest('SHA-256', enc);
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }
  const gate = document.getElementById('gate');
  const pwdInput = document.getElementById('pwd');
  const unlockBtn = document.getElementById('unlockBtn');
  const gateError = document.getElementById('gateError');

  async function tryUnlock(){
    const val = pwdInput.value.trim();
    if(!val) return;
    const hash = await sha256(val);
    if(hash === CORRECT_HASH){
      gate.classList.add('hidden');
      setTimeout(()=> gate.style.display='none', 650);
      document.getElementById('app').classList.add('visible');
      sessionStorage.setItem('gm_unlocked','1');
    } else {
      gateError.classList.add('show');
      pwdInput.value='';
      setTimeout(()=> gateError.classList.remove('show'), 1800);
    }
  }
  unlockBtn.addEventListener('click', tryUnlock);
  pwdInput.addEventListener('keydown', e=>{ if(e.key==='Enter') tryUnlock(); });
  if(sessionStorage.getItem('gm_unlocked')==='1'){
    gate.style.display='none';
    document.getElementById('app').classList.add('visible');
  }

  function nowIST(){ return new Date(new Date().toLocaleString('en-US', {timeZone:'Asia/Kolkata'})); }
  const now = nowIST();
  const hour = now.getHours() + now.getMinutes()/60;
  const isNight = (hour < 5 || hour >= 19);

  const root = document.documentElement.style;
  const starsEl = document.getElementById('stars');
  const rainEl = document.getElementById('rain');
  const sunEl = document.getElementById('sun');
  const hero = document.getElementById('hero');

  function setSky(top, bottom, sun, text, showStars, sunTop, sunOpacity){
    root.setProperty('--sky-top', top);
    root.setProperty('--sky-bottom', bottom);
    root.setProperty('--sun-color', sun);
    root.setProperty('--text-on-sky', text);
    starsEl.style.opacity = showStars ? '1' : '0';
    sunEl.style.top = sunTop + '%';
    sunEl.style.opacity = sunOpacity;
  }

  // base time-of-day palette
  let base;
  if(hour >= 5 && hour < 8) base = {top:'#FCEEDD',bottom:'#F6C9B8',sun:'#E3A64B',text:'#3B2A35',stars:false,sunTop:62,sunOp:1};
  else if(hour >= 8 && hour < 16) base = {top:'#DCEBF2',bottom:'#FBF6F0',sun:'#F2C868',text:'#3B2A35',stars:false,sunTop:12,sunOp:1};
  else if(hour >= 16 && hour < 19) base = {top:'#E9D6E8',bottom:'#F0B39B',sun:'#E08A5B',text:'#3B2A35',stars:false,sunTop:55,sunOp:1};
  else base = {top:'#241C36',bottom:'#4A314D',sun:'#F6ECE5',text:'#F6ECE5',stars:true,sunTop:70,sunOp:1};

  setSky(base.top, base.bottom, base.sun, base.text, base.stars, base.sunTop, base.sunOp);
  if(base.stars){
    let starsHTML = '';
    for(let i=0;i<40;i++){
      const top = Math.random()*70, left = Math.random()*100, delay = (Math.random()*3).toFixed(2);
      starsHTML += `<div class="star" style="top:${top}%;left:${left}%;animation-delay:${delay}s;"></div>`;
    }
    starsEl.innerHTML = starsHTML;
  }
  sunEl.style.left = '18%';

  function addClouds(count, opacity){
    for(let i=0;i<count;i++){
      const c = document.createElement('div');
      c.className='cloud';
      const w = 90 + Math.random()*80, h = w*0.3;
      const top = 10 + Math.random()*35;
      const dur = 60 + Math.random()*50;
      const delay = -Math.random()*40;
      c.style.cssText = `width:${w}px;height:${h}px;top:${top}%;animation-duration:${dur}s;animation-delay:${delay}s;opacity:${opacity};`;
      hero.appendChild(c);
    }
  }
  function addRain(){
    let dropsHTML = '';
    for(let i=0;i<45;i++){
      const left = Math.random()*100;
      const dur = (0.6 + Math.random()*0.6).toFixed(2);
      const delay = (Math.random()*2).toFixed(2);
      dropsHTML += `<div class="drop" style="left:${left}%;animation-duration:${dur}s;animation-delay:${delay}s;"></div>`;
    }
    rainEl.innerHTML = dropsHTML;
    rainEl.style.opacity = '1';
  }

  if(!isNight) addClouds(2, 0.55);

  // ---------- weather (Ambernath, Maharashtra) ----------
  const weatherChip = document.getElementById('weatherChip');
  const dayIdx = Math.floor((now - new Date(now.getFullYear(),0,0)) / 86400000);

  function weatherPhrase(code, tmax){
    const hot = tmax >= 33;
    const clearPhrases = ["clear skies today - a good one to step outside", "bright and clear out there today", "sunshine all day - enjoy it"];
    const cloudyPhrases = ["a bit cloudy today, soft light all around", "overcast skies today, nice and mellow", "grey skies today but should stay dry"];
    const rainPhrases = ["looks like rain today - don't forget your umbrella", "rain's likely today, carry an umbrella just in case", "expect showers today - keep that umbrella handy"];
    const stormPhrases = ["thunderstorms expected - stay safe and dry today", "a stormy day ahead - better to stay indoors if you can"];
    const fogPhrases = ["a foggy start to the day - take it slow if you're heading out"];

    let phrase;
    if([95,96,99].includes(code)) phrase = stormPhrases[dayIdx % stormPhrases.length];
    else if([51,53,55,56,57,61,63,65,66,67,80,81,82].includes(code)) phrase = rainPhrases[dayIdx % rainPhrases.length];
    else if([45,48].includes(code)) phrase = fogPhrases[dayIdx % fogPhrases.length];
    else if([1,2,3].includes(code)) phrase = cloudyPhrases[dayIdx % cloudyPhrases.length];
    else phrase = clearPhrases[dayIdx % clearPhrases.length];

    if(hot && ![95,96,99,51,53,55,56,57,61,63,65,66,67,80,81,82].includes(code)){
      phrase += " - stay hydrated, Niyu";
    }
    return phrase;
  }

  try{
    const wRes = await fetch('https://api.open-meteo.com/v1/forecast?latitude=19.1953&longitude=73.1936&current=weather_code,temperature_2m&daily=weather_code,temperature_2m_max&timezone=Asia%2FKolkata');
    const wData = await wRes.json();
    const code = wData.current?.weather_code ?? wData.daily?.weather_code?.[0] ?? 0;
    const tmax = wData.daily?.temperature_2m_max?.[0] ?? 30;

    weatherChip.textContent = '☁ ' + weatherPhrase(code, tmax);
    weatherChip.style.display = 'inline-flex';

    // adjust sky for weather, layered on top of time-of-day base
    const rainy = [51,53,55,56,57,61,63,65,66,67,80,81,82,95,96,99].includes(code);
    const cloudy = [1,2,3,45,48].includes(code);

    if(rainy){
      if(isNight) setSky('#2B3040','#3E4658', base.sun, '#F0EEF2', true, base.sunTop, 0);
      else setSky('#AEBAC9','#D7CFCB', base.sun, '#33303B', false, base.sunTop, 0);
      addRain();
    } else if(cloudy){
      if(!isNight){
        setSky('#CFD9E0','#F1EAE2', base.sun, base.text, false, base.sunTop, 0.55);
        addClouds(2, 0.7);
      } else {
        setSky('#2E2A40','#463B4E', base.sun, base.text, true, base.sunTop, 1);
      }
    }
  } catch(err){
    weatherChip.style.display = 'none';
  }

  function fmtDate(d){ return d.toLocaleDateString('en-IN', {weekday:'long', year:'numeric', month:'long', day:'numeric'}); }
  function isoDate(d){ return d.toISOString().slice(0,10); }
  function dayOfYear(d){ const start = new Date(d.getFullYear(),0,0); return Math.floor((d - start) / 86400000); }

  document.getElementById('dateLabel').textContent = fmtDate(now);

  const envelope = document.getElementById('envelope');
  const tapLabel = document.getElementById('tapLabel');
  const letterPaper = document.getElementById('letterPaper');

  function heartBurst(originEl){
    const rect = originEl.getBoundingClientRect();
    const cx = rect.left + rect.width/2;
    const cy = rect.top + rect.height/2;
    const colors = ['#D9A441','#B98CA5','#F0C9C0'];
    for(let i=0;i<10;i++){
      const h = document.createElement('div');
      const angle = (Math.PI * 2 * i / 10) + (Math.random()*0.4);
      const dist = 60 + Math.random()*50;
      const dx = Math.cos(angle) * dist;
      const dy = Math.sin(angle) * dist - 20;
      h.style.cssText = `position:fixed; left:${cx}px; top:${cy}px; width:14px; height:14px;
        background:${colors[i%3]}; clip-path: path('M7 13C7 13 1 9 1 5.2C1 3.2 2.6 1.6 4.6 1.6C5.8 1.6 6.6 2.2 7 2.9C7.4 2.2 8.2 1.6 9.4 1.6C11.4 1.6 13 3.2 13 5.2C13 9 7 13 7 13Z');
        z-index:40; pointer-events:none; transform: translate(-50%,-50%) scale(0.4); opacity:1;
        transition: transform 0.9s cubic-bezier(.2,.7,.3,1), opacity 0.9s ease;`;
      document.body.appendChild(h);
      requestAnimationFrame(()=>{
        h.style.transform = `translate(-50%,-50%) translate(${dx}px, ${dy}px) scale(1) rotate(${(Math.random()*60-30)}deg)`;
        h.style.opacity = '0';
      });
      setTimeout(()=> h.remove(), 950);
    }
  }

  envelope.addEventListener('click', ()=>{
    if(envelope.classList.contains('open')) return;
    envelope.classList.add('open');
    tapLabel.style.opacity = '0';
    heartBurst(envelope);
    setTimeout(()=>{
      letterPaper.classList.add('show');
    }, 300);
  });

  function scatterHearts(container, count){
    let html = '';
    for(let i=0;i<count;i++){
      const left = Math.random()*100;
      const size = 10 + Math.random()*14;
      const dur = 14 + Math.random()*12;
      const delay = -Math.random()*20;
      const drift = (Math.random()*60-30).toFixed(0)+'px';
      html += `<div class="fheart" style="left:${left}%; --drift:${drift}; animation-duration:${dur}s; animation-delay:${delay}s;">
        <svg width="${size}" height="${size}" viewBox="0 0 32 32" fill="none"><path d="M16 28C16 28 3 19.8 3 11.6C3 7.4 6.4 4 10.4 4C13 4 15 5.4 16 7.2C17 5.4 19 4 21.6 4C25.6 4 29 7.4 29 11.6C29 19.8 16 28 16 28Z" fill="currentColor"/></svg>
      </div>`;
    }
    container.innerHTML = html;
  }
  scatterHearts(document.getElementById('heroHearts'), 6);
  scatterHearts(document.getElementById('letterHearts'), 5);

  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightboxImg');
  lightbox.addEventListener('click', ()=> lightbox.classList.remove('show'));

  try{
    const res = await fetch('message.json?t=' + Date.now());
    const data = await res.json();

    document.getElementById('dayChip').textContent =
      data.startDate ? ('day ' + (Math.floor((now - new Date(data.startDate)) / 86400000) + 1) + ' of good mornings') : '';

    const messageEl = document.getElementById('messageText');
    const memoryBlock = document.getElementById('memoryBlock');
    const memoryTitle = document.getElementById('memoryTitle');
    const photosEl = document.getElementById('photos');
    const signoffEl = document.getElementById('signoff');

    let entry = null;
    if(data.today && data.today.date === isoDate(now)){
      entry = data.today;
    } else {
      const fb = data.fallbacks || [];
      if(fb.length) entry = fb[dayOfYear(now) % fb.length];
    }

    if(!entry){
      messageEl.textContent = "Good morning, Niyu. Just wanted you to see this first thing today.";
    } else {
      if(entry.type === 'memory' && (entry.photos||[]).length){
        memoryBlock.style.display = 'block';
        memoryTitle.textContent = entry.memoryTitle || '';
        photosEl.innerHTML = '';
        (entry.photos||[]).forEach(src=>{
          const card = document.createElement('div');
          card.className = 'photo-card';
          const img = document.createElement('img');
          img.src = src;
          img.alt = 'a memory';
          img.addEventListener('click', ()=>{
            lightboxImg.src = src;
            lightbox.classList.add('show');
          });
          card.appendChild(img);
          photosEl.appendChild(card);
        });
      }
      messageEl.textContent = entry.message || '';
      signoffEl.textContent = entry.signoff || '';
    }
  } catch(err){
    document.getElementById('messageText').textContent = "Good morning, Niyu. (couldn't load today's note, but I'm thinking of you.)";
  }
})();
</script>

</body>
</html>
