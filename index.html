<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Good Morning, Niyu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Caveat:wght@500;600;700&family=Work+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#3B2A35;
    --ink-soft:#6E5A66;
    --gold:#D9A441;
    --blush:#F0C9C0;
    --mauve:#B98CA5;
    --paper:#FFFDFB;

    --sky-top:#FCEEDD;
    --sky-mid:#F6C9B8;
    --sky-bottom:#F3E4DC;
    --sun-color:#E3A64B;
    --text-on-sky:#3B2A35;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0; height:100%;}
  body{
    font-family:'Work Sans', sans-serif;
    color:var(--ink);
    overflow-x:hidden;
    min-height:100dvh;
    background: linear-gradient(to bottom, var(--sky-top) 0%, var(--sky-mid) 45%, var(--sky-bottom) 100%);
    transition: background 1.8s ease;
  }

  /* ================= PASSWORD GATE ================= */
  #gate{
    position:fixed; inset:0; z-index:50;
    background:var(--paper);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:22px; padding:24px; text-align:center;
    transition: opacity 0.6s ease;
  }
  #gate.hidden{ opacity:0; pointer-events:none; }
  .gate-label{ font-family:'Caveat', cursive; font-size:1.6rem; color:var(--mauve); }
  #pwd{
    font-family:'Work Sans', sans-serif; font-size:1.1rem;
    padding:14px 18px; border-radius:14px; border:1.5px solid var(--blush);
    background:#fff; color:var(--ink); width:220px; text-align:center;
    outline:none; letter-spacing:2px;
  }
  #pwd:focus{ border-color:var(--gold); }
  #unlockBtn{
    font-family:'Work Sans', sans-serif; font-size:0.95rem; letter-spacing:0.5px;
    padding:12px 28px; border-radius:999px; border:none;
    background:var(--ink); color:var(--paper); cursor:pointer;
    transition: transform 0.2s ease;
  }
  #unlockBtn:active{ transform:scale(0.97); }
  #gateError{ font-size:0.85rem; color:#b5546b; height:16px; opacity:0; transition: opacity 0.2s ease; }
  #gateError.show{ opacity:1; }

  #app{ opacity:0; transition: opacity 0.9s ease; position:relative; min-height:100dvh; }
  #app.visible{ opacity:1; }

  /* ================= AMBIENT SKY LAYERS ================= */
  .sky-layer{ position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
  .stars{ position:absolute; inset:0; opacity:0; transition:opacity 1.5s ease; }
  .star{ position:absolute; width:2px; height:2px; background:#fff; border-radius:50%; animation: twinkle 3s ease-in-out infinite; }
  @keyframes twinkle{ 0%,100%{opacity:0.2;} 50%{opacity:1;} }

  .cloud{ position:absolute; background: rgba(255,255,255,0.6); border-radius:50%; filter: blur(9px); animation: drift linear infinite; }
  @keyframes drift{ from{ transform: translateX(-15vw); } to{ transform: translateX(115vw); } }

  .rain{ position:absolute; inset:0; opacity:0; transition:opacity 1s ease; }
  .drop{ position:absolute; width:2px; height:16px; top:-20px; background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0.55)); animation: fall linear infinite; }
  @keyframes fall{ to{ transform: translateY(120vh); } }

  .sun{
    position:absolute; width:110px; height:110px; border-radius:50%;
    background: var(--sun-color); left:14%;
    box-shadow: 0 0 60px 10px color-mix(in srgb, var(--sun-color) 55%, transparent);
    transition: background 1.8s ease, opacity 1.5s ease, top 2s ease;
  }

  .fheart{ position:absolute; bottom:-40px; opacity:0; color: var(--mauve); animation: floatUp linear infinite; }
  @keyframes floatUp{
    0%{ transform: translateY(0) translateX(0) rotate(0deg); opacity:0; }
    12%{ opacity:0.3; }
    88%{ opacity:0.22; }
    100%{ transform: translateY(-100vh) translateX(var(--drift,20px)) rotate(20deg); opacity:0; }
  }

  /* ================= PAGE CONTENT ================= */
  .page{
    position:relative; z-index:2;
    min-height:100dvh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding: 48px 22px 40px;
    color: var(--text-on-sky);
    transition: color 1.8s ease;
  }

  .eyebrow{ font-size:0.68rem; letter-spacing:3px; text-transform:uppercase; opacity:0.75; margin-bottom:12px; }
  h1{
    font-family:'Fraunces', serif; font-weight:500; font-optical-sizing:auto;
    font-size:2.3rem; line-height:1.12; margin:0 0 6px; text-align:center;
  }
  h1 .script{ font-family:'Caveat', cursive; font-weight:700; color:var(--gold); font-size:1.2em; margin-left:6px; display:inline-block; }
  .date{ font-size:0.85rem; opacity:0.85; margin-bottom:14px; text-align:center; }
  .chips{ display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-bottom:30px; }
  .chip{
    display:inline-flex; align-items:center; gap:6px;
    background: rgba(255,255,255,0.4); backdrop-filter: blur(6px);
    border:1px solid rgba(255,255,255,0.55); padding:7px 14px; border-radius:999px;
    font-size:0.74rem; letter-spacing:0.3px;
  }

  /* ================= FLIP LOCKET ================= */
  .flip-container{
    perspective: 1400px;
    width: min(320px, 84vw);
    height: min(430px, 60vh);
    min-height:340px;
  }
  .flip-card{
    position:relative; width:100%; height:100%;
    transform-style: preserve-3d;
    transition: transform 1s cubic-bezier(.45,.05,.15,1);
    cursor:pointer;
  }
  .flip-card.flipped{ transform: rotateY(180deg); cursor:default; }

  .face{
    position:absolute; inset:0;
    -webkit-backface-visibility:hidden; backface-visibility:hidden;
    border-radius:22px;
    box-shadow: 0 24px 60px rgba(59,42,53,0.22);
  }

  .face-front{
    background: linear-gradient(160deg, rgba(255,255,255,0.85), rgba(255,255,255,0.55));
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.7);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:18px; padding:24px; text-align:center;
  }
  .locket{
    width:84px; height:84px; position:relative;
    animation: lockPulse 2.6s ease-in-out infinite;
  }
  .locket svg{ width:100%; height:100%; filter: drop-shadow(0 6px 14px rgba(217,164,65,0.4)); }
  @keyframes lockPulse{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.07); } }
  .front-label{ font-family:'Caveat', cursive; font-size:1.5rem; color: var(--mauve); }
  .front-sub{ font-size:0.7rem; letter-spacing:2px; text-transform:uppercase; color:var(--ink-soft); }

  .face-back{
    background:#fff;
    transform: rotateY(180deg);
    padding: 30px 26px;
    overflow-y:auto;
    display:flex; flex-direction:column;
    -webkit-overflow-scrolling:touch;
  }
  .memory-title{ font-family:'Caveat', cursive; font-size:1.7rem; color:var(--mauve); margin:0 0 12px; text-align:center; }
  .photos{ display:flex; gap:12px; overflow-x:auto; padding:4px 4px 14px; margin-bottom:6px; scroll-snap-type:x proximity; }
  .photo-card{
    flex:0 0 auto; background:#fff; padding:7px 7px 16px; border-radius:6px;
    box-shadow: 0 8px 20px rgba(59,42,53,0.16); scroll-snap-align:center; cursor:pointer;
    transform: rotate(var(--r,-1.5deg));
  }
  .photo-card:nth-child(even){ --r:1.5deg; }
  .photo-card img{ display:block; width:130px; height:150px; object-fit:cover; border-radius:2px; }

  .message{
    font-family:'Fraunces', serif; font-weight:400; font-size:1.05rem; line-height:1.65;
    color:var(--ink); white-space:pre-wrap; text-align:center; margin:auto 0;
  }
  .signoff{ font-family:'Caveat', cursive; font-size:1.2rem; color:var(--ink-soft); margin-top:18px; text-align:center; }
  .close-hint{
    font-size:0.66rem; letter-spacing:1.5px; text-transform:uppercase; color:var(--ink-soft);
    opacity:0.55; text-align:center; margin-top:14px;
  }

  #lightbox{
    position:fixed; inset:0; background:rgba(20,12,18,0.9);
    display:none; align-items:center; justify-content:center; z-index:60; padding:20px;
  }
  #lightbox.show{ display:flex; }
  #lightbox img{ max-width:100%; max-height:85vh; border-radius:6px; box-shadow:0 20px 50px rgba(0,0,0,0.5); }

  footer{
    position:relative; z-index:2;
    text-align:center; padding: 6px 24px 34px;
    font-size:0.65rem; letter-spacing:1px; color: var(--text-on-sky);
    opacity:0.55; text-transform:uppercase;
  }

  @media (max-width:360px){ h1{ font-size:2rem; } }
</style>
</head>
<body>

<div id="gate">
  <div class="gate-label">good morning belongs to Niyu only</div>
  <input id="pwd" type="password" inputmode="numeric" placeholder="• • • • • • • •" maxlength="20" autocomplete="off">
  <button id="unlockBtn">Unlock</button>
  <div id="gateError">that's not quite it, try again</div>
</div>

<div id="app">
  <div class="sky-layer">
    <div class="stars" id="stars"></div>
    <div class="rain" id="rain"></div>
    <div class="sun" id="sun"></div>
    <div id="hearts"></div>
  </div>

  <div class="page">
    <div class="eyebrow">for niyu</div>
    <h1>Good morning<span class="script">Niyu</span></h1>
    <div class="date" id="dateLabel"></div>
    <div class="chips">
      <div class="chip" id="dayChip"></div>
      <div class="chip" id="weatherChip" style="display:none;"></div>
    </div>

    <div class="flip-container">
      <div class="flip-card" id="flipCard">
        <div class="face face-front">
          <div class="locket">
            <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M16 28C16 28 3 19.8 3 11.6C3 7.4 6.4 4 10.4 4C13 4 15 5.4 16 7.2C17 5.4 19 4 21.6 4C25.6 4 29 7.4 29 11.6C29 19.8 16 28 16 28Z" fill="var(--gold)"/>
            </svg>
          </div>
          <div class="front-label">you've got something today</div>
          <div class="front-sub">tap to open</div>
        </div>
        <div class="face face-back">
          <div id="memoryBlock" style="display:none;">
            <div class="memory-title" id="memoryTitle"></div>
            <div class="photos" id="photos"></div>
          </div>
          <div class="message" id="messageText">loading...</div>
          <div class="signoff" id="signoff"></div>
          <div class="close-hint">tap to close</div>
        </div>
      </div>
    </div>
  </div>

  <footer>made every morning, for you</footer>
</div>

<div id="lightbox"><img id="lightboxImg" src="" alt=""></div>

<script>
(async function(){
  const CORRECT_HASH = "f6a6ede1db281475a3d12161f3630e225fb251ae0a21453a24520c3f00cb2d85";
  async function sha256(text){
    const enc = new TextEncoder().encode(text);
    const buf = await crypto.subtle.digest('SHA-256', enc);
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }
  const gate = document.getElementById('gate');
  const pwdInput = document.getElementById('pwd');
  const unlockBtn = document.getElementById('unlockBtn');
  const gateError = document.getElementById('gateError');

  const NTFY_TOPIC = 'niyu-morning-ec04b55c';
  function notifyVisit(){
    try{
      const now = new Date(new Date().toLocaleString('en-US', {timeZone:'Asia/Kolkata'}));
      const dateStr = now.toLocaleDateString('en-IN', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
      const timeStr = now.toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'});
      fetch('https://ntfy.sh/' + NTFY_TOPIC, {
        method: 'POST',
        body: `Niyu opened the page on ${dateStr} at ${timeStr}`,
        headers: { 'Title': 'Good Morning site visit', 'Tags': 'heart' }
      }).catch(()=>{});
    } catch(e){}
  }

  async function tryUnlock(){
    const val = pwdInput.value.trim();
    if(!val) return;
    const hash = await sha256(val);
    if(hash === CORRECT_HASH){
      gate.classList.add('hidden');
      setTimeout(()=> gate.style.display='none', 650);
      document.getElementById('app').classList.add('visible');
      sessionStorage.setItem('gm_unlocked','1');
      notifyVisit();
    } else {
      gateError.classList.add('show');
      pwdInput.value='';
      setTimeout(()=> gateError.classList.remove('show'), 1800);
    }
  }
  unlockBtn.addEventListener('click', tryUnlock);
  pwdInput.addEventListener('keydown', e=>{ if(e.key==='Enter') tryUnlock(); });
  if(sessionStorage.getItem('gm_unlocked')==='1'){
    gate.style.display='none';
    document.getElementById('app').classList.add('visible');
    notifyVisit();
  }

  function nowIST(){ return new Date(new Date().toLocaleString('en-US', {timeZone:'Asia/Kolkata'})); }
  const now = nowIST();
  const hour = now.getHours() + now.getMinutes()/60;
  const isNight = (hour < 5 || hour >= 19);

  const body = document.body;
  const starsEl = document.getElementById('stars');
  const rainEl = document.getElementById('rain');
  const sunEl = document.getElementById('sun');
  const heartsEl = document.getElementById('hearts');

  function setSky(top, mid, bottom, sun, text, showStars, sunTop, sunOpacity){
    document.documentElement.style.setProperty('--sky-top', top);
    document.documentElement.style.setProperty('--sky-mid', mid);
    document.documentElement.style.setProperty('--sky-bottom', bottom);
    document.documentElement.style.setProperty('--sun-color', sun);
    document.documentElement.style.setProperty('--text-on-sky', text);
    starsEl.style.opacity = showStars ? '1' : '0';
    sunEl.style.top = sunTop + '%';
    sunEl.style.opacity = sunOpacity;
  }

  let base;
  if(hour >= 5 && hour < 8) base = {top:'#FCEEDD',mid:'#F6C9B8',bottom:'#F3E4DC',sun:'#E3A64B',text:'#3B2A35',stars:false,sunTop:58,sunOp:1};
  else if(hour >= 8 && hour < 16) base = {top:'#DCEBF2',mid:'#EAF1EE',bottom:'#FBF6F0',sun:'#F2C868',text:'#3B2A35',stars:false,sunTop:10,sunOp:1};
  else if(hour >= 16 && hour < 19) base = {top:'#E9D6E8',mid:'#F0B39B',bottom:'#F6E1D3',sun:'#E08A5B',text:'#3B2A35',stars:false,sunTop:50,sunOp:1};
  else base = {top:'#1D1730',mid:'#332944',bottom:'#4A314D',sun:'#F6ECE5',text:'#F6ECE5',stars:true,sunTop:64,sunOp:1};

  setSky(base.top, base.mid, base.bottom, base.sun, base.text, base.stars, base.sunTop, base.sunOp);
  if(base.stars){
    let html = '';
    for(let i=0;i<45;i++){
      const top = Math.random()*65, left = Math.random()*100, delay = (Math.random()*3).toFixed(2);
      html += `<div class="star" style="top:${top}%;left:${left}%;animation-delay:${delay}s;"></div>`;
    }
    starsEl.innerHTML = html;
  }

  function addClouds(count, opacity){
    for(let i=0;i<count;i++){
      const c = document.createElement('div');
      c.className='cloud';
      const w = 90 + Math.random()*90, h = w*0.3;
      const top = 8 + Math.random()*30;
      const dur = 70 + Math.random()*50;
      const delay = -Math.random()*40;
      c.style.cssText = `width:${w}px;height:${h}px;top:${top}%;animation-duration:${dur}s;animation-delay:${delay}s;opacity:${opacity};`;
      document.querySelector('.sky-layer').appendChild(c);
    }
  }
  function addRain(){
    let html = '';
    for(let i=0;i<50;i++){
      const left = Math.random()*100;
      const dur = (0.6 + Math.random()*0.6).toFixed(2);
      const delay = (Math.random()*2).toFixed(2);
      html += `<div class="drop" style="left:${left}%;animation-duration:${dur}s;animation-delay:${delay}s;"></div>`;
    }
    rainEl.innerHTML = html;
    rainEl.style.opacity = '1';
  }
  function scatterHearts(count){
    let html = '';
    for(let i=0;i<count;i++){
      const left = Math.random()*100;
      const size = 10 + Math.random()*14;
      const dur = 16 + Math.random()*14;
      const delay = -Math.random()*24;
      const drift = (Math.random()*60-30).toFixed(0)+'px';
      html += `<div class="fheart" style="left:${left}%; --drift:${drift}; animation-duration:${dur}s; animation-delay:${delay}s;">
        <svg width="${size}" height="${size}" viewBox="0 0 32 32" fill="none"><path d="M16 28C16 28 3 19.8 3 11.6C3 7.4 6.4 4 10.4 4C13 4 15 5.4 16 7.2C17 5.4 19 4 21.6 4C25.6 4 29 7.4 29 11.6C29 19.8 16 28 16 28Z" fill="currentColor"/></svg>
      </div>`;
    }
    heartsEl.innerHTML = html;
  }

  if(!isNight) addClouds(3, 0.55);
  scatterHearts(7);

  // ---------- weather (Ambernath, Maharashtra) ----------
  const weatherChip = document.getElementById('weatherChip');
  const dayIdx = Math.floor((now - new Date(now.getFullYear(),0,0)) / 86400000);

  function weatherPhrase(code, tmax){
    const hot = tmax >= 33;
    const isRainy = [51,53,55,56,57,61,63,65,66,67,80,81,82].includes(code);
    const isStorm = [95,96,99].includes(code);
    const isFog = [45,48].includes(code);
    const isCloudy = [1,2,3].includes(code);

    const clearPhrases = ["Clear skies today - enjoy the sunshine! ♥️☀️", "Bright and clear today! ♥️☀️", "Sunny all day today! ♥️☀️"];
    const cloudyPhrases = ["Cloudy skies today - nice and mellow! ♥️☁️", "Overcast today, stays cool at least! ♥️☁️", "Grey skies today but should stay dry! ♥️☁️"];
    const rainPhrases = ["It's a rainy day - carry your umbrella with you! ♥️☔", "Showers expected today - umbrella, don't forget! ♥️☔", "Rain's likely today - keep that umbrella handy! ♥️☔"];
    const stormPhrases = ["Thunderstorms today - stay safe and dry! ♥️⛈️", "Stormy today - better to stay indoors if you can! ♥️⛈️"];
    const fogPhrases = ["Foggy start today - take it slow out there! ♥️🌫️"];
    const hotPhrases = ["It'll be quite hot today, Niyu - please don't skip water just because you're busy! ♥️🥵"];

    let phrase;
    if(isStorm) phrase = stormPhrases[dayIdx % stormPhrases.length];
    else if(isRainy) phrase = rainPhrases[dayIdx % rainPhrases.length];
    else if(isFog) phrase = fogPhrases[dayIdx % fogPhrases.length];
    else if(hot) phrase = hotPhrases[dayIdx % hotPhrases.length];
    else if(isCloudy) phrase = cloudyPhrases[dayIdx % cloudyPhrases.length];
    else phrase = clearPhrases[dayIdx % clearPhrases.length];

    return "Niyu Weather Update: " + phrase;
  }

  try{
    const wRes = await fetch('https://api.open-meteo.com/v1/forecast?latitude=19.1953&longitude=73.1936&current=weather_code,temperature_2m&daily=weather_code,temperature_2m_max&timezone=Asia%2FKolkata');
    const wData = await wRes.json();
    const code = wData.current?.weather_code ?? wData.daily?.weather_code?.[0] ?? 0;
    const tmax = wData.daily?.temperature_2m_max?.[0] ?? 30;

    weatherChip.textContent = weatherPhrase(code, tmax);
    weatherChip.style.display = 'inline-flex';

    const rainy = [51,53,55,56,57,61,63,65,66,67,80,81,82,95,96,99].includes(code);
    const cloudy = [1,2,3,45,48].includes(code);

    if(rainy){
      if(isNight) setSky('#232840','#2E3450','#3E4658', base.sun, '#F0EEF2', true, base.sunTop, 0);
      else setSky('#A8B5C6','#C7C4CB','#DAD1CC', base.sun, '#33303B', false, base.sunTop, 0);
      addRain();
    } else if(cloudy){
      if(!isNight){
        setSky('#CFD9E0','#E4DDD6','#F1EAE2', base.sun, base.text, false, base.sunTop, 0.55);
        addClouds(2, 0.7);
      } else {
        setSky('#241F38','#3A2E44','#463B4E', base.sun, base.text, true, base.sunTop, 1);
      }
    }
  } catch(err){
    weatherChip.style.display = 'none';
  }

  function fmtDate(d){ return d.toLocaleDateString('en-IN', {weekday:'long', year:'numeric', month:'long', day:'numeric'}); }
  function isoDate(d){ return d.toISOString().slice(0,10); }
  function dayOfYear(d){ const start = new Date(d.getFullYear(),0,0); return Math.floor((d - start) / 86400000); }

  document.getElementById('dateLabel').textContent = fmtDate(now);

  // ---------- flip card ----------
  const flipCard = document.getElementById('flipCard');
  flipCard.addEventListener('click', ()=>{
    flipCard.classList.toggle('flipped');
  });

  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightboxImg');
  lightbox.addEventListener('click', ()=> lightbox.classList.remove('show'));

  try{
    const res = await fetch('message.json?t=' + Date.now());
    const data = await res.json();

    document.getElementById('dayChip').textContent =
      data.startDate ? ('day ' + (Math.floor((now - new Date(data.startDate)) / 86400000) + 1) + ' of good mornings') : '';

    const messageEl = document.getElementById('messageText');
    const memoryBlock = document.getElementById('memoryBlock');
    const memoryTitle = document.getElementById('memoryTitle');
    const photosEl = document.getElementById('photos');
    const signoffEl = document.getElementById('signoff');

    let entry = null;
    if(data.today && data.today.date === isoDate(now)){
      entry = data.today;
    } else {
      const fb = data.fallbacks || [];
      if(fb.length) entry = fb[dayOfYear(now) % fb.length];
    }

    if(!entry){
      messageEl.textContent = "Good morning, Niyu. Just wanted you to see this first thing today.";
    } else {
      if(entry.type === 'memory' && (entry.photos||[]).length){
        memoryBlock.style.display = 'block';
        memoryTitle.textContent = entry.memoryTitle || '';
        photosEl.innerHTML = '';
        (entry.photos||[]).forEach(src=>{
          const card = document.createElement('div');
          card.className = 'photo-card';
          const img = document.createElement('img');
          img.src = src;
          img.alt = 'a memory';
          img.addEventListener('click', (e)=>{
            e.stopPropagation();
            lightboxImg.src = src;
            lightbox.classList.add('show');
          });
          card.appendChild(img);
          photosEl.appendChild(card);
        });
      }
      messageEl.textContent = entry.message || '';
      signoffEl.textContent = entry.signoff || '';
    }
  } catch(err){
    document.getElementById('messageText').textContent = "Good morning, Niyu. (couldn't load today's note, but I'm thinking of you.)";
  }
})();
</script>
